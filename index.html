<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>
        Studio Ghibli API
    </title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Fuente -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;700&display=swap"
    rel="stylesheet">

    <style>

        /* SOLO estilos del botón */

        .btn-container{
            display:flex;
            justify-content:center;
            margin-top:25px;
        }

        .heart-btn{
            padding:15px 30px;
            font-size:20px;
            border:none;
            border-radius:50px;
            background:#7ec8ff;
            color:white;
            cursor:pointer;
            box-shadow:0 6px 15px rgba(0,0,0,0.15);
            transition:0.3s;
            font-family:'Quicksand', sans-serif;
        }

        .heart-btn:hover{
            transform:scale(1.05);
            background:#5bb8ff;
        }

        .heart{
            position:fixed;
            font-size:30px;
            animation:floatUp 2s linear forwards;
            pointer-events:none;
            z-index:9999;
        }

        @keyframes floatUp{
            0%{
                transform:translateY(0) scale(1);
                opacity:1;
            }

            100%{
                transform:translateY(-250px) scale(1.8) rotate(20deg);
                opacity:0;
            }
        }

    </style>

</head>

<body>

    <!-- FONDO -->

    <div class="background"></div>


    <!-- HEADER -->

    <header>

        <h1>
            Studio Ghibli API
        </h1>

        <!-- BOTÓN CENTRADO -->

        <div class="btn-container">
            <button class="heart-btn" onclick="createHearts()">
                💙 Presióname 💙
            </button>
        </div>

    </header>


    <!-- HERO -->

    <section class="hero">

        <div class="hero-text">

            <h2>
                Explora el universo de Studio Ghibli
            </h2>

        </div>

    </section>



    <main>

        <section class="peliculas-section">

            <h2>
                Peliculas de Studio Ghibli
            </h2>

            <div id="contenedor"></div>

        </section>

    </main>



    <footer>

        <p>
            Proyecto hecho con HTML, CSS y JavaScript
        </p>

    </footer>


    <script>

        function createHearts(){

            for(let i = 0; i < 15; i++){

                const heart = document.createElement("div");
                heart.classList.add("heart");

                const emojis = ["💙","🩵","💠","❄️","✨"];
                heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

                heart.style.left = Math.random() * window.innerWidth + "px";
                heart.style.top = (window.innerHeight - 100) + "px";

                heart.style.fontSize = (20 + Math.random() * 30) + "px";

                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 2000);
            }
        }

    </script>

    <script src="app.js"></script>

</body>

</html>
